# Configurable paths for embedding generation and visualization.
# Set these via CLI args or environment variables; CLI args take precedence.
#
# Usage:
#   python bin/master_eval --output-dir <out> --dset-path data/sample.csv --image-dir /path/to/images --dr dr11

# Image directory containing DECam FITS files (*.fits.fz)
image_dir: null

# Dataset CSV with columns: expnum, image_filename, image_hdu, reasons, vi_source
dset_path: null

# Data release: dr10 or dr11
dr: dr11

# Visualization paths (used by decam_postage_stamps.py)
visualization:
  surveyccd_path: null
  surveyccd_path_dr8: null
  blob_dir: null
