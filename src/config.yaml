data:
    dset_path: path
    batch_size: 4
    crop_scale:
        - 14*168
        - 14*84
    crop_size: 224
    num_workers: 10
    pin_mem: true
    num_patch: 20
    drop_idx: 0, 3, 10, 11 # these are the indices rejected in data making process
logging:
    folder: /persistence/world_models/
    log_freq_time: 60
training:
    model_size: base
    use_register: true
    exp_dir: 
    epochs: 50
distributed:
    backend: nccl
    device: cuda
